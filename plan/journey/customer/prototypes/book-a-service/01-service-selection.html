<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 1 — Escolha os serviços (autenticado)</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    COMPONENT: ServiceSelectionStep  (EXISTS — no changes to the component itself)
    FILE:      apps/web/components/booking/ServiceSelectionStep.tsx
    CHANGE:    BookingForm needs mode='customer' prop. The step component is identical to guest.
    PARENT:    BookingForm (mode='customer', step={1})
    DIFFERENCE vs guest: "Voltar" navigates to /{slug}, not to /auth/login.
  -->

  <!-- AUTH HEADER BAR — shows logged-in user; clicking goes to login page -->
  <div class="auth-bar">
    <a href="../../../shared/login.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--ba-text);">
      <div class="auth-avatar">JS</div>
      <span>João Silva</span>
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 1 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Escolha os serviços</h2>

    <!-- Same card list as guest — ServiceSelectionStep receives same props -->
    <ul style="display: flex; flex-direction: column; gap: 0.75rem; list-style: none; padding: 0;">
      <li>
        <label class="card selected" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox" checked>
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Lavagem Simples</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Limpeza externa completa com secagem</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 60,00</p>
            <p style="opacity: 0.75;">30 min</p>
          </div>
        </label>
      </li>
      <li>
        <label class="card" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox">
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Polimento Completo</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Polimento e cristalização da pintura</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 250,00</p>
            <p style="opacity: 0.75;">2 h</p>
          </div>
        </label>
      </li>
      <!--
        Service with requiresPickupAddress: true — when selected:
        pickup address in step 1 is PRE-FILLED with customer.defaultAddress (fetched on mount).
        COMPONENT: AddressFields with pre-filled values from customer.defaultAddress.
      -->
      <li>
        <label class="card" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox">
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Lavagem com Coleta</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Buscamos e entregamos seu veículo</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 90,00</p>
            <p style="opacity: 0.75;">45 min</p>
          </div>
        </label>
      </li>
    </ul>

    <p style="margin-top: 1rem; font-weight: 600; color: var(--ba-text)">1 serviço — R$ 60,00 — 30 min</p>

    <div class="nav-buttons">
      <!-- For customer: "Voltar" goes to /{slug}, not to login -->
      <button class="btn-secondary" onclick="window.history.back()">Voltar</button>
      <a class="btn-primary" href="02-calendar-slot.html">Próximo</a>
    </div>
  </div>
</body>
</html>
