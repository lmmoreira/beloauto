    FILE (TO CREATE): apps/web/components/booking/AuthenticatedBookingReviewStep.tsx
    STORY:           M13-S02 or new story

    KEY DIFFERENCE vs PersonalInfoStep (guest):
      ✅ NO name / email / phone form — customer is authenticated; data comes from JWT cookie
      ✅ Services + date/time shown as READ-ONLY summary (for context before confirming)
      ✅ Pickup address PRE-FILLED from customer.defaultAddress (fetched via GET /customers/me)
      ✅ PhotoUpload reused unchanged

    PROPS:
      slug:               string
      services:           HotsiteServiceResponse[]
      selectedServiceIds: string[]
      selectedDate:       string
      selectedSlot:       AvailableSlot
      requiresPickupAddress: boolean
      pickupAddress:      Address  (pre-filled from customer.defaultAddress)
      onPickupAddressChange: (address: Address) => void
      value:              { photoFilePaths: string[] }
      onChange:           (v: { photoFilePaths: string[] }) => void
      onNext:             () => void
      onBack:             () => void

    DATA FETCH (on mount):
      GET /customers/me  — returns customer profile including defaultAddress
      Header: Authorization: Bearer <jwt>  (sent automatically by BFF from cookie)
      Shows skeleton/loading state while fetching
      On error: show inline error, disable "Próximo"

    OPEN QUESTION: Does GET /customers/me exist in BFF? Check apps/bff/src/ before implementing.
  -->

    <!--
      PHOTO UPLOAD (optional) — reused unchanged
      COMPONENT: PhotoUpload  (apps/web/components/booking/PhotoUpload.tsx)
      Same upload flow as guest: POST /bookings/attachments/signed-url → PUT to GCS

      <p class="form-label">Fotos do veículo (opcional)</p>

    <div class="nav-buttons">
