<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 4 — Confirmar agendamento (autenticado)</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    COMPONENT: ConfirmationStep  (EXISTS — reuse unchanged)
    FILE:      apps/web/components/booking/ConfirmationStep.tsx
    DIFFERENCE vs guest: submit calls createAuthenticatedBooking() instead of createBooking()

    ON SUBMIT — calls createAuthenticatedBooking(payload) (new function in lib/api/bookings.ts):
      POST /bookings/authenticated
      Header: Authorization: Bearer <jwt>  (cookie → BFF extracts, forwards X-Actor-*)
      Content-Type: application/json
      Body: AuthenticatedBookingRequest
        {
          scheduledAt:             string,     // ISO-8601 UTC
          serviceIds:              string[],   // uuid[]
          pickupAddress?:          Address,    // optional, only if requiresPickupAddress
          beforeServicePhotoUrls?: string[],   // GCS keys, optional
        }

    NOTE: NO contactName / contactEmail / contactPhone in payload — BFF reads customer from JWT sub.

    RESPONSES: same handling as guest
      201 Created → status = 'success'
      409 Conflict → back to step 2 + step2Error
      Other → status = 'error'
  -->

  <!-- AUTH HEADER BAR -->
  <div class="auth-bar">
    <a href="../../../shared/login.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--ba-text);">
      <div class="auth-avatar">JS</div>
      <span>João Silva</span>
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 4 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Confirme seu agendamento</h2>

    <!-- SERVICES SUMMARY -->
    <ul style="margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.25rem; list-style: none; padding: 0;">
      <li style="display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--ba-text);">
        <span>Lavagem Simples</span>
        <span>R$ 60,00</span>
      </li>
    </ul>

    <p style="font-weight: 600; color: var(--ba-text); margin-bottom: 0.5rem;">Total: R$ 60,00 — 30 min</p>
    <p style="color: var(--ba-text); margin-bottom: 1rem;">Quarta-feira, 18 de junho às 10:00</p>

    <!--
      CUSTOMER IDENTITY — shown for authenticated path only (reinforces who is booking)
      Read from JWT decoded client-side (or passed from page.tsx as prop)
    -->
    <div style="
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.625rem 0.875rem;
      background: var(--ba-secondary);
      border-radius: var(--ba-radius);
      font-size: 0.875rem;
      color: var(--ba-text);
      margin-bottom: 1.25rem;
    ">
      <div class="auth-avatar" style="width: 1.5rem; height: 1.5rem; font-size: 0.625rem;">JS</div>
      <span>Agendando como <strong>João Silva</strong> · joao@email.com</span>
    </div>

    <!-- ERROR STATE — data-testid="confirmation-error" -->
    <!--
    <p style="margin-top: 1rem; color: #dc2626;" data-testid="confirmation-error">
      Não foi possível enviar sua solicitação. Tente novamente.
    </p>
    -->

    <!-- SUCCESS STATE -->
    <!--
    <div>
      <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--ba-text)">Solicitação enviada!</h2>
      <p data-testid="confirmation-success">Solicitação enviada! Aguarde a confirmação por email.</p>
      <a href="../../index.html"
        style="display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.5rem;
               border: 1px solid var(--ba-secondary); border-radius: var(--ba-radius);
               color: var(--ba-text); text-decoration: none;">
        Voltar para o site
      </a>
    </div>
    -->

    <div class="nav-buttons">
      <a class="btn-secondary" href="03-review-confirm.html">Voltar</a>
      <button class="btn-primary">Confirmar agendamento</button>
    </div>
  </div>
</body>
</html>
