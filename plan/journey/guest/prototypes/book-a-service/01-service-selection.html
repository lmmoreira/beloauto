<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 1 — Escolha os serviços</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    COMPONENT: ServiceSelectionStep
    FILE:      apps/web/components/booking/ServiceSelectionStep.tsx  (EXISTS — no changes needed)
    PARENT:    BookingForm (step={1})
    PROPS:     services, selectedServiceIds, onToggleService, requiresPickupAddress,
               pickupAddress, onPickupAddressChange, onNext, onBack
  -->
  <!-- GUEST LOGIN BAR — shown when user is unauthenticated -->
  <!-- Same position/size as auth-bar in customer path; clicking goes to /auth/login -->
  <div style="
    background: var(--ba-secondary); padding: 0.5rem 1.5rem;
    display: flex; align-items: center; justify-content: flex-end;
  ">
    <a href="../../../shared/login.html" style="
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.875rem; font-weight: 500;
      color: var(--ba-primary); text-decoration: none;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Entrar
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 1 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Escolha os serviços</h2>

    <!--
      SERVICE CARDS — rendered from HotsiteServiceResponse[] passed as props.
      DATA SOURCE: page.tsx fetches via lib/api/services.ts (server-side, no client fetch here).
      CARD STATE: isSelected → border-color: --ba-primary; else → border-color: --ba-secondary
    -->
    <ul style="display: flex; flex-direction: column; gap: 0.75rem; list-style: none; padding: 0;">

      <!-- Card 1 — selected (blue border) -->
      <li>
        <label class="card selected" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox" checked>
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Lavagem Simples</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Limpeza externa completa com secagem</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 60,00</p>
            <p style="opacity: 0.75;">30 min</p>
          </div>
        </label>
      </li>

      <!-- Card 2 — unselected -->
      <li>
        <label class="card" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox">
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Polimento Completo</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Polimento e cristalização da pintura</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 250,00</p>
            <p style="opacity: 0.75;">2 h</p>
          </div>
        </label>
      </li>

      <!--
        Card 3 — service with requiresPickupAddress: true
        When this is selected, AddressFields (pickup) appear below the card list.
        COMPONENT: AddressFields  (apps/web/components/booking/AddressFields.tsx)
      -->
      <li>
        <label class="card" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox">
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Lavagem com Coleta</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Buscamos e entregamos seu veículo</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 90,00</p>
            <p style="opacity: 0.75;">45 min</p>
          </div>
        </label>
      </li>

    </ul>

    <!--
      SELECTION SUMMARY — shown when selected.length > 0
      data-testid="selection-total"
      Format: "{n} serviço(s) — {formatBRL(total)} — {formatDuration(totalMinutes)}"
    -->
    <p style="margin-top: 1rem; font-weight: 600; color: var(--ba-text)">
      1 serviço — R$ 60,00 — 30 min
    </p>

    <!--
      PICKUP ADDRESS FIELDS — rendered only when requiresPickupAddress = true
      COMPONENT: AddressFields  (apps/web/components/booking/AddressFields.tsx)
      VALIDATION: all fields required; ZIP autocomplete via viacep-address-lookup.adapter.ts
      ERROR: "Informe o endereço de coleta para continuar."  (data-testid="step1-error")

      Uncomment below to preview the pickup address state:
    -->
    <!--
    <div style="margin-top: 1.5rem;">
      <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--ba-text)">Endereço de coleta</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div style="grid-column: span 2;">
          <label class="form-label" for="zip">CEP</label>
          <input id="zip" class="form-input" type="text" placeholder="00000-000" maxlength="9">
        </div>
        <div style="grid-column: span 2;">
          <label class="form-label" for="street">Rua</label>
          <input id="street" class="form-input" type="text">
        </div>
        <div>
          <label class="form-label" for="number">Número</label>
          <input id="number" class="form-input" type="text">
        </div>
        <div>
          <label class="form-label" for="complement">Complemento</label>
          <input id="complement" class="form-input" type="text" placeholder="Opcional">
        </div>
        <div>
          <label class="form-label" for="neighborhood">Bairro</label>
          <input id="neighborhood" class="form-input" type="text">
        </div>
        <div>
          <label class="form-label" for="city">Cidade</label>
          <input id="city" class="form-input" type="text">
        </div>
        <div>
          <label class="form-label" for="state">Estado (UF)</label>
          <input id="state" class="form-input" type="text" maxlength="2" placeholder="SP">
        </div>
      </div>
      <p style="margin-top: 0.75rem; font-size: 0.875rem; color: #dc2626;" data-testid="step1-error">
        Informe o endereço de coleta para continuar.
      </p>
    </div>
    -->

    <div class="nav-buttons">
      <button class="btn-secondary" onclick="window.history.back()">Voltar</button>
      <a class="btn-primary" href="02-calendar-slot.html">Próximo</a>
    </div>
  </div>
</body>
</html>
