<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 2 — Calendário e horário</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    COMPONENTS:
      AvailabilityCarousel  apps/web/components/booking/AvailabilityCarousel.tsx  (EXISTS)
      SlotPicker            apps/web/components/booking/SlotPicker.tsx             (EXISTS)

    BFF CALLS:
      Carousel → GET /schedule/availability/summary?from=YYYY-MM-DD&to=YYYY-MM-DD&serviceIds=uuid,uuid
                 Header: X-Tenant-Slug: {slug}
                 Fetcher: apps/web/lib/api/schedule.ts
                 Response: AvailabilitySummaryResponse { dates: { date: string; available: boolean }[] }

      Slots    → GET /schedule/availability?date=YYYY-MM-DD&serviceIds=uuid,uuid
                 Header: X-Tenant-Slug: {slug}
                 Response: AvailabilityResponse { slots: { startsAt: string; endsAt: string }[] }

    STATE (in BookingForm parent):
      selectedDate: string | null
      selectedSlot: AvailableSlot | null
      step2Error:   string | null  — set to 'Horário indisponível, escolha outro' on 409 from submit
  -->
  <!-- GUEST LOGIN BAR -->
  <div style="
    background: var(--ba-secondary); padding: 0.5rem 1.5rem;
    display: flex; align-items: center; justify-content: flex-end;
  ">
    <a href="../../../shared/login.html" style="
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.875rem; font-weight: 500;
      color: var(--ba-primary); text-decoration: none;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Entrar
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 2 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Escolha data e horário</h2>

    <!-- AVAILABILITY CAROUSEL — horizontal scroll of day pills -->
    <!-- Loading: skeleton rows while fetching (already implemented in AvailabilityCarousel) -->
    <div style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SEG</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">16</p>
      </div>
      <div class="day-pill available">
        <p style="font-size: 0.7rem; font-weight: 600;">TER</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">17</p>
      </div>
      <!-- Selected day -->
      <div class="day-pill selected">
        <p style="font-size: 0.7rem; font-weight: 600;">QUA</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">18</p>
      </div>
      <div class="day-pill available">
        <p style="font-size: 0.7rem; font-weight: 600;">QUI</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">19</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SEX</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">20</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SÁB</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">21</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">DOM</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">22</p>
      </div>
    </div>

    <!--
      SLOT PICKER — shown when selectedDate is set
      Loading: "Carregando horários..." while fetching
    -->
    <div style="margin-top: 1.5rem;">
      <p style="font-size: 0.875rem; opacity: 0.75; margin-bottom: 0.75rem;">
        Horários disponíveis — Qua, 18 de junho
      </p>
      <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
        <button class="slot-btn">08:00</button>
        <button class="slot-btn">09:00</button>
        <!-- Selected slot -->
        <button class="slot-btn selected">10:00</button>
        <button class="slot-btn">11:00</button>
        <button class="slot-btn">14:00</button>
        <button class="slot-btn">15:00</button>
        <button class="slot-btn">16:00</button>
      </div>
    </div>

    <!--
      ERROR STATE — shown when 409 Conflict on submit (slot was taken between selection and submit)
      data-testid="step2-error"
      Uncomment to preview:
    -->
    <!--
    <p style="margin-top: 1rem; font-size: 0.875rem; color: #dc2626;" data-testid="step2-error">
      Horário indisponível, escolha outro
    </p>
    -->

    <div class="nav-buttons">
      <a class="btn-secondary" href="01-service-selection.html">Voltar</a>
      <!-- Disabled state: btn-primary:disabled when selectedSlot === null -->
      <a class="btn-primary" href="03-personal-info.html">Próximo</a>
    </div>
  </div>
</body>
</html>
