<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 2 — Sem horários disponíveis</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    VARIANT OF: 02-calendar-slot.html
    SCENARIO:   AvailabilityCarousel loaded successfully, but every day in the window
                returned available: false (fully booked, or a long ScheduleClosure).
    COMPONENT:  AvailabilityCarousel  apps/web/components/booking/AvailabilityCarousel.tsx  (EXISTS)

    KNOWN LIMITATION (see dev-notes.md "Known limitations"): this is exactly what the
    component renders today — N disabled pills, ZERO explanatory copy. A guest cannot
    tell "fully booked" from "the page is broken". This screen makes that gap visible
    for review. The carousel actually fetches a 14-day window; 7 pills shown here for
    layout — all 14 would render identically (disabled, greyed out).
  -->
  <!-- BRAND + AUTH BAR -->
  <div style="background:white;border-bottom:1px solid var(--ba-secondary);
              padding:0.625rem 1.5rem;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:0.625rem;">
      <div style="width:1.875rem;height:1.875rem;border-radius:0.375rem;background:var(--ba-primary);
                  color:white;display:flex;align-items:center;justify-content:center;
                  font-weight:700;font-size:0.8125rem;">B</div>
      <span style="font-weight:700;font-size:0.9375rem;color:var(--ba-text);">BeloAuto Demo</span>
    </div>
    <a href="../../../shared/login.html" style="display:flex;align-items:center;gap:0.375rem;
       font-size:0.875rem;font-weight:500;color:var(--ba-primary);text-decoration:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Entrar
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 2 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Escolha data e horário</h2>

    <div style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SEG</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">16</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">TER</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">17</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">QUA</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">18</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">QUI</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">19</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SEX</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">20</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SÁB</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">21</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">DOM</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">22</p>
      </div>
    </div>

    <!--
      PROPOSED FIX (not implemented — for discussion).
      When days.every(d => !d.available), render a message below the carousel.
    -->
    <div role="alert" style="
      display: flex; align-items: flex-start; gap: 0.625rem;
      background: #fef2f2; border: 1.5px solid #fca5a5;
      border-radius: var(--ba-radius); padding: 0.75rem 1rem;
      margin-top: 1rem;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 1px;">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span style="font-size: 0.875rem; color: #dc2626; font-weight: 500;">Nenhum horário disponível nos próximos dias. Entre em contato conosco para agendar.</span>
    </div>

    <div class="nav-buttons">
      <a class="btn-secondary" href="01-service-selection.html">Voltar</a>
      <button class="btn-primary" disabled style="opacity: 0.6; cursor: not-allowed;">Próximo</button>
    </div>
  </div>
</body>
</html>
