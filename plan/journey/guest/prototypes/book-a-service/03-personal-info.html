<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 3 — Seus dados</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    COMPONENT: PersonalInfoStep
    FILE:      apps/web/components/booking/PersonalInfoStep.tsx  (EXISTS — no changes needed)
    PROPS:     slug, value: PersonalInfoValue, onChange, onNext, onBack
    TYPE:      PersonalInfoValue — lib/booking/personal-info.ts

    VALIDATION (client-side, runs on "Próximo" click):
      contactName:  required, min 1 char        → error: "Informe seu nome."
      contactEmail: required, z.email()          → error: "Informe um e-mail válido."
      contactPhone: required, 10–11 BR digits    → error: "Informe seu telefone."
      formatted by formatPhoneBR() from lib/utils.ts
    ERROR: data-testid="personal-info-error"
  -->
  <!-- GUEST LOGIN BAR -->
  <div style="
    background: var(--ba-secondary); padding: 0.5rem 1.5rem;
    display: flex; align-items: center; justify-content: flex-end;
  ">
    <a href="../../../shared/login.html" style="
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.875rem; font-weight: 500;
      color: var(--ba-primary); text-decoration: none;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Entrar
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 3 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Seus dados</h2>

    <!-- GRID: 2-col on sm+, 1-col on mobile -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">

      <div>
        <label class="form-label" for="name">Nome</label>
        <!-- required; validation: min 1 char -->
        <input id="name" class="form-input" type="text" value="João Silva" required>
      </div>

      <div>
        <label class="form-label" for="email">E-mail</label>
        <!-- required; validation: z.email() -->
        <input id="email" class="form-input" type="email" value="joao@email.com" required>
      </div>

      <div style="grid-column: span 1;">
        <label class="form-label" for="phone">Telefone</label>
        <!--
          Phone input with +55 prefix span.
          formatPhoneBR() formats as (11) 91234-5678 on every change.
          validation: 10–11 digits after stripping non-numeric chars.
        -->
        <div style="display: flex;">
          <span style="
            display: flex; align-items: center; padding: 0 0.75rem;
            border: 1px solid var(--ba-secondary); border-right: none;
            background: #f9fafb;
            border-radius: var(--ba-radius) 0 0 var(--ba-radius);
            font-size: 0.875rem; font-weight: 500; color: var(--ba-text);
          ">+55</span>
          <input
            id="phone"
            class="form-input"
            type="tel"
            inputmode="numeric"
            maxlength="15"
            placeholder="(11) 91234-5678"
            value="(11) 91234-5678"
            style="border-radius: 0 var(--ba-radius) var(--ba-radius) 0;"
          >
        </div>
      </div>

    </div>

    <!--
      OPTIONAL CONTACT ADDRESS — toggle, aria-expanded tracks state
      COMPONENT: AddressFields  (apps/web/components/booking/AddressFields.tsx)
      When visible: same ZIP/street/number/complement/neighborhood/city/state grid as pickup.
      Sent as contactAddress in payload if filled (isAddressFilled() check in buildPayload).
    -->
    <div style="margin-top: 1.5rem;">
      <button
        style="font-size: 0.875rem; font-weight: 500; text-decoration: underline; background: none; border: none; cursor: pointer; color: var(--ba-primary);"
        aria-expanded="false"
      >
        Endereço de contato (opcional)
      </button>
      <!-- AddressFields rendered here when aria-expanded="true" -->
    </div>

    <!--
      READ-ONLY SUMMARY CARD — service + date/time selected in steps 1 and 2
      Passed as props from BookingForm: services, selectedServiceIds, selectedDate, selectedSlot
      Same card used in customer's AuthenticatedBookingReviewStep.
      To add to PersonalInfoStep: accept selectedDate + selectedSlot as new props and render this above PhotoUpload.
    -->
    <h3 style="font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 1rem; color: var(--ba-text)">Revisar pedido</h3>
    <div class="card">
      <p style="font-size: 0.75rem; font-weight: 600; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">Serviço</p>
      <p style="font-weight: 600; color: var(--ba-text)">Lavagem Simples</p>
      <p style="font-size: 0.875rem; color: var(--ba-primary); margin-top: 0.125rem;">R$ 60,00 — 30 min</p>

      <hr style="border: none; border-top: 1px solid var(--ba-secondary); margin: 0.875rem 0;">

      <p style="font-size: 0.75rem; font-weight: 600; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">Data e horário</p>
      <p style="font-weight: 600; color: var(--ba-text)">Quarta-feira, 18 de junho às 10:00</p>
    </div>

    <!--
      PHOTO UPLOAD
      COMPONENT: PhotoUpload  (apps/web/components/booking/PhotoUpload.tsx)
      FLOW:
        1. User picks file → POST /bookings/attachments/signed-url
           body: { fileName, contentType: 'image/jpeg'|'image/png', tenantSlug: slug }
        2. Receive { signedUrl: string; key: string }
        3. PUT file to signedUrl (direct GCS upload, no CORS issues)
        4. Push key (e.g. "tenants/{id}/uploads/{id}/photo.jpg") to photoFilePaths[]
        5. photoFilePaths sent as beforeServicePhotoUrls[] in POST /bookings payload
      ACCEPT: image/jpeg, image/png
    -->
    <div style="margin-top: 1.5rem;">
      <p class="form-label">Fotos do veículo (opcional)</p>
      <div class="upload-area">
        <p style="opacity: 0.75; font-size: 0.875rem;">Clique para adicionar fotos</p>
        <p style="font-size: 0.75rem; opacity: 0.5; margin-top: 0.25rem;">JPG ou PNG</p>
      </div>
    </div>

    <!-- ERROR STATE — data-testid="personal-info-error" — uncomment to preview -->
    <!--
    <p style="margin-top: 1rem; font-size: 0.875rem; color: #dc2626;" data-testid="personal-info-error">
      Informe um e-mail válido.
    </p>
    -->

    <div class="nav-buttons">
      <a class="btn-secondary" href="02-calendar-slot.html">Voltar</a>
      <a class="btn-primary" href="04-confirmation.html">Próximo</a>
    </div>
  </div>
</body>
</html>
