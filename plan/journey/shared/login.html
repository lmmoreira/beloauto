<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Entrar com Google</title>
  <link rel="stylesheet" href="./tokens.css">
</head>
<body>
  <!--
    SHARED FILE — plan/journey/shared/login.html
    Used by: all journeys that require authentication (customer, future staff SSO, etc.)
    Do not duplicate per actor — link here via ../../../shared/login.html

    PAGE (GAP): apps/web/app/auth/login/page.tsx — does not exist yet (M13-S02)
    ROUTE:      /auth/login?redirect=/{slug}/booking

    FULL FLOW:
      1. User lands on /auth/login
      2. Clicks "Entrar com Google"
      3. Browser → GET /api/auth/google?redirect=/{slug}/booking
      4. BFF redirects to Google OAuth consent screen
      5. Google → /api/auth/callback/google?code=...
         → BFF exchanges code for JWT → sets httpOnly cookie
      6a. 1 tenant  → redirect to /{slug}/booking  (customer step 1)
      6b. >1 tenants → redirect to /select-tenant  (UC-021 A3 — GAP)
  -->

  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ba-background);">
    <div class="card" style="width: 100%; max-width: 24rem; padding: 2rem; text-align: center;">

      <!-- Tenant logo — from hotsiteConfig.branding.logoUrl, fallback to name initial -->
      <div style="
        width: 3rem; height: 3rem;
        background: var(--ba-primary);
        border-radius: var(--ba-radius);
        margin: 0 auto 1.25rem;
        display: flex; align-items: center; justify-content: center;
      ">
        <span style="color: white; font-weight: 700; font-size: 1.25rem;">B</span>
      </div>

      <h1 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.375rem; color: var(--ba-text)">
        Entrar na BeloAuto
      </h1>
      <p style="font-size: 0.875rem; opacity: 0.65; margin-bottom: 1.75rem; color: var(--ba-text)">
        Entre com sua conta Google para agendar
      </p>

      <!--
        GOOGLE SIGN-IN BUTTON
        Action: GET /api/auth/google?redirect=/{slug}/booking
        In prototype: clicking goes to customer booking step 1 (simulates successful login)
      -->
      <a
        href="../customer/prototypes/book-a-service/01-service-selection.html"
        style="
          display: flex; align-items: center; justify-content: center; gap: 0.75rem;
          border: 1px solid var(--ba-secondary);
          border-radius: var(--ba-radius);
          padding: 0.75rem 1.5rem;
          text-decoration: none;
          color: var(--ba-text);
          font-weight: 500;
          box-shadow: var(--ba-shadow);
          width: 100%;
        "
      >
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-3.9z" fill="#FFC107"/>
          <path d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" fill="#FF3D00"/>
          <path d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2A12 12 0 0 1 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z" fill="#4CAF50"/>
          <path d="M43.6 20.1H42V20H24v8h11.3a12 12 0 0 1-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.7-.4-3.9z" fill="#1976D2"/>
        </svg>
        Entrar com Google
      </a>

      <p style="margin-top: 1.5rem; font-size: 0.75rem; opacity: 0.45; color: var(--ba-text);">
        Ao entrar, você concorda com os termos de uso.
      </p>

      <p style="margin-top: 1rem; font-size: 0.75rem; opacity: 0.55; color: var(--ba-text);">
        ← <a href="./hotsite.html" style="color: var(--ba-primary);">Voltar ao site</a>
      </p>
    </div>
  </div>
</body>
</html>
